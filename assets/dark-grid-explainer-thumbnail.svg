<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Dark grid explainer style thumbnail">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>
    </pattern>
    <radialGradient id="violetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="hair" x1="0" x2="1">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.78"/>
      <stop offset="48%" stop-color="#6ee7b7" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#fcd34d" stop-opacity="0.72"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="#05070b"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <circle cx="260" cy="160" r="260" fill="url(#blueGlow)" filter="url(#blur)"/>
  <circle cx="965" cy="230" r="300" fill="url(#violetGlow)" filter="url(#blur)"/>
  <circle cx="640" cy="690" r="250" fill="url(#amberGlow)" filter="url(#blur)"/>
  <rect width="1280" height="720" fill="rgba(0,0,0,0.12)"/>

  <g opacity="0.08" font-family="Inter, Microsoft YaHei, sans-serif" font-weight="900" font-size="126" fill="#ffffff">
    <text x="72" y="612">LOOP</text>
  </g>

  <g transform="translate(86 74)">
    <rect x="0" y="0" width="186" height="34" rx="17" fill="rgba(147,197,253,0.13)" stroke="rgba(147,197,253,0.38)"/>
    <text x="20" y="23" font-family="Inter, Microsoft YaHei, sans-serif" font-size="14" font-weight="800" letter-spacing="2" fill="#bfdbfe">STYLE SAMPLE</text>
  </g>

  <g transform="translate(86 145)" font-family="Inter, Microsoft YaHei, sans-serif">
    <text x="0" y="0" font-size="50" font-weight="900" fill="#f8fbff">Explain from</text>
    <text x="0" y="62" font-size="50" font-weight="900" fill="#f8fbff">first principles, not</text>
    <text x="0" y="124" font-size="50" font-weight="900" fill="#fcd34d">from headings</text>
    <text x="0" y="178" font-size="19" font-weight="500" fill="rgba(235,241,255,0.66)">A compact technical deck: claim, mechanism, boundary, improvement.</text>
  </g>

  <g transform="translate(116 408)" font-family="Inter, Microsoft YaHei, sans-serif" filter="url(#softShadow)">
    <rect x="0" y="0" width="240" height="84" rx="12" fill="rgba(147,197,253,0.12)" stroke="rgba(147,197,253,0.42)"/>
    <text x="22" y="34" font-size="23" font-weight="850" fill="#93c5fd">Problem</text>
    <text x="22" y="58" font-size="14" font-weight="550" fill="rgba(255,255,255,0.68)">surface vs real question</text>

    <rect x="264" y="0" width="240" height="84" rx="12" fill="rgba(110,231,183,0.10)" stroke="rgba(110,231,183,0.42)"/>
    <text x="286" y="34" font-size="23" font-weight="850" fill="#6ee7b7">Mechanism</text>
    <text x="286" y="58" font-size="14" font-weight="550" fill="rgba(255,255,255,0.68)">constraints and variables</text>

    <rect x="528" y="0" width="240" height="84" rx="12" fill="rgba(252,211,77,0.10)" stroke="rgba(252,211,77,0.42)"/>
    <text x="550" y="34" font-size="23" font-weight="850" fill="#fcd34d">Upgrade</text>
    <text x="550" y="58" font-size="14" font-weight="550" fill="rgba(255,255,255,0.68)">limits and improvements</text>
  </g>

  <g transform="translate(792 132)">
    <circle cx="158" cy="158" r="136" fill="rgba(255,255,255,0.025)" stroke="rgba(165,180,252,0.40)" stroke-width="2"/>
    <circle cx="158" cy="158" r="68" fill="rgba(165,180,252,0.12)" stroke="rgba(165,180,252,0.58)"/>
    <text x="158" y="151" text-anchor="middle" font-family="Inter, Microsoft YaHei, sans-serif" font-size="28" font-weight="900" fill="#f8fbff">Core</text>
    <text x="158" y="181" text-anchor="middle" font-family="Inter, Microsoft YaHei, sans-serif" font-size="17" font-weight="650" fill="rgba(235,241,255,0.64)">thesis</text>

    <g font-family="Inter, Microsoft YaHei, sans-serif" font-weight="800" font-size="15">
      <circle cx="158" cy="16" r="27" fill="rgba(56,189,248,0.15)" stroke="rgba(56,189,248,0.55)"/>
      <text x="158" y="22" text-anchor="middle" fill="#7dd3fc">F1</text>
      <circle cx="292" cy="202" r="27" fill="rgba(110,231,183,0.14)" stroke="rgba(110,231,183,0.55)"/>
      <text x="292" y="208" text-anchor="middle" fill="#6ee7b7">C</text>
      <circle cx="40" cy="235" r="27" fill="rgba(252,211,77,0.14)" stroke="rgba(252,211,77,0.55)"/>
      <text x="40" y="241" text-anchor="middle" fill="#fcd34d">R</text>
    </g>
    <path d="M158 43C174 82 176 104 172 122" fill="none" stroke="rgba(125,211,252,0.54)" stroke-width="2"/>
    <path d="M254 194C222 185 206 176 192 166" fill="none" stroke="rgba(110,231,183,0.50)" stroke-width="2"/>
    <path d="M64 222C92 196 108 184 128 172" fill="none" stroke="rgba(252,211,77,0.50)" stroke-width="2"/>
  </g>

  <g transform="translate(1210 244)">
    <circle cx="0" cy="0" r="5" fill="#93c5fd"/>
    <circle cx="0" cy="24" r="5" fill="rgba(255,255,255,0.30)"/>
    <circle cx="0" cy="48" r="5" fill="rgba(255,255,255,0.30)"/>
    <circle cx="0" cy="72" r="5" fill="rgba(255,255,255,0.30)"/>
  </g>

  <g transform="translate(180 626)">
    <rect x="0" y="0" width="920" height="52" rx="12" fill="rgba(0,0,0,0.58)" stroke="rgba(255,255,255,0.14)"/>
    <text x="460" y="33" text-anchor="middle" font-family="Inter, Microsoft YaHei, sans-serif" font-size="15" font-weight="560" fill="rgba(255,255,255,0.86)">Subtitle bar stays compact and never covers the core diagram.</text>
  </g>

  <g transform="translate(1134 632)" font-family="Inter, Microsoft YaHei, sans-serif">
    <rect x="0" y="0" width="96" height="38" rx="10" fill="rgba(0,0,0,0.36)" stroke="rgba(255,255,255,0.14)"/>
    <text x="18" y="25" font-size="22" font-weight="800" fill="rgba(255,255,255,0.75)">‹</text>
    <text x="48" y="24" text-anchor="middle" font-size="12" font-weight="800" fill="rgba(255,255,255,0.64)">1/8</text>
    <text x="78" y="25" font-size="22" font-weight="800" fill="rgba(255,255,255,0.75)">›</text>
  </g>
  <rect x="0" y="716" width="1280" height="4" fill="url(#hair)"/>
</svg>
