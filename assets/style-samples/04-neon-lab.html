<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>neon-lab sample</title><style>
:root{--bg:#05070b;--ink:#f8fbff;--muted:rgba(235,241,255,.62);--hair:rgba(255,255,255,.13);--accent:#6ee7b7;--violet:#a5b4fc}*{box-sizing:border-box}body{margin:0;height:100vh;background:#05070b;color:var(--ink);font-family:MiSans,'Microsoft YaHei',sans-serif;overflow:hidden}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px}body:after{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 24% 22%,rgba(110,231,183,.22),transparent 26%),radial-gradient(circle at 80% 40%,rgba(165,180,252,.20),transparent 26%);filter:blur(90px)}.slide{position:relative;z-index:1;height:100vh;padding:42px 56px 100px;display:grid;align-items:center}.stage{width:min(1060px,100%);margin:0 auto;display:grid;gap:18px}.kicker{font-size:12px;letter-spacing:.17em;color:var(--accent);font-weight:900}.title{font-size:clamp(30px,3vw,44px);line-height:1.1;margin:0}.hl{color:var(--accent)}.lead{color:var(--muted);font-size:17px;line-height:1.6}.lab{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid color-mix(in srgb,var(--accent) 38%,transparent);border-bottom:1px solid color-mix(in srgb,var(--accent) 38%,transparent);position:relative}.lab:before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:.5}.cell{min-height:210px;padding:20px 22px;border-right:1px solid rgba(255,255,255,.12);background:linear-gradient(180deg,rgba(255,255,255,.045),transparent)}.cell:last-child{border-right:0}.cell span{display:block;color:var(--accent);font-size:13px;letter-spacing:.14em;font-weight:900}.cell b{display:block;margin-top:12px;font-size:22px}.cell p{color:var(--muted);font-size:14px;line-height:1.55}.pulse{display:inline-block;margin-right:8px;filter:drop-shadow(0 0 12px var(--accent))}
</style></head><body><section class="slide"><div class="stage"><div class="kicker">NEON LAB</div><h1 class="title"><span class="pulse">✦</span>把机制做成<span class="hl">实验台</span></h1><p class="lead">适合讲推理、反思、迭代、Agent loop、AI 范式等概念。可稍微增强动效和发光，但仍保持信息清晰。</p><div class="lab"><div class="cell"><span>01 INPUT</span><b>引入状态</b><p>明确任务、上下文和当前约束。</p></div><div class="cell"><span>02 TEST</span><b>调用工具</b><p>让系统接触外部反馈，不靠内部猜测。</p></div><div class="cell"><span>03 REFINE</span><b>修正输出</b><p>根据观察结果更新下一轮动作。</p></div></div></div></section></body></html>
