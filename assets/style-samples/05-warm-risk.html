<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>warm-risk sample</title><style>
:root{--bg:#090806;--ink:#fffaf0;--muted:rgba(255,246,225,.60);--hair:rgba(252,211,77,.18);--accent:#f59e0b;--risk:#ff6f91}*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;background:#090806;color:var(--ink);font-family:MiSans,'Microsoft YaHei',sans-serif}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(252,211,77,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(252,211,77,.025) 1px,transparent 1px);background-size:56px 56px}body:after{content:"";position:fixed;inset:-10%;background:radial-gradient(circle at 18% 24%,rgba(245,158,11,.18),transparent 26%),radial-gradient(circle at 72% 70%,rgba(255,111,145,.15),transparent 24%);filter:blur(75px)}.slide{position:relative;z-index:1;height:100vh;padding:44px 58px 98px;display:grid;align-items:center}.stage{width:min(1060px,100%);margin:0 auto;display:grid;gap:18px}.kicker{font-size:12px;letter-spacing:.16em;color:var(--accent);font-weight:900}.title{margin:0;font-size:clamp(28px,3vw,42px);line-height:1.12}.hl{color:var(--accent)}.risk-word{color:var(--risk)}.lead{color:var(--muted);font-size:17px;line-height:1.6}.xray{display:grid;gap:12px;position:relative;padding-left:28px}.xray:before{content:"";position:absolute;left:8px;top:8px;bottom:8px;width:2px;background:linear-gradient(transparent,var(--accent),var(--risk),transparent)}.row{display:grid;grid-template-columns:48px 1fr 88px;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.10)}.mark{width:30px;height:30px;border:1px solid color-mix(in srgb,var(--accent) 50%,transparent);display:grid;place-items:center;border-radius:8px;color:var(--accent);font-weight:900}.row b{font-size:18px}.row span,.row em{color:var(--muted);font-style:normal;font-size:13px}.row em{color:var(--risk);letter-spacing:.12em;text-transform:uppercase}
</style></head><body><section class="slide"><div class="stage"><div class="kicker">WARM RISK</div><h1 class="title">风险页要展示<span class="hl">传播链</span>，不是只写<span class="risk-word">警告</span></h1><p class="lead">适合失败模式、约束、权衡、安全、合规、系统边界。用暖色提示风险层级，但不要把整页染红。</p><div class="xray"><div class="row"><div class="mark">!</div><b>目标误解</b><span>输入阶段偏差</span><em>source</em></div><div class="row"><div class="mark">↻</div><b>工具噪声</b><span>外部结果不稳定</span><em>signal</em></div><div class="row"><div class="mark">⌁</div><b>上下文污染</b><span>历史信息误导下一步</span><em>spread</em></div><div class="row"><div class="mark">■</div><b>停止失效</b><span>循环越跑越远</span><em>failure</em></div></div></div></section></body></html>
