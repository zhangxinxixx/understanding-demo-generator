<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>compact-dark-grid sample</title><style>
:root{--bg:#05070b;--ink:#f8fbff;--muted:rgba(235,241,255,.62);--hair:rgba(255,255,255,.13);--accent:#a5b4fc}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:MiSans,'HarmonyOS Sans SC','Microsoft YaHei',sans-serif;overflow:hidden}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:60px 60px}body:after{content:"";position:fixed;inset:-10%;background:radial-gradient(circle at 20% 24%,rgba(99,102,241,.20),transparent 28%),radial-gradient(circle at 76% 68%,rgba(45,212,232,.13),transparent 28%);filter:blur(70px)}.slide{position:relative;z-index:1;height:100vh;padding:42px 56px 108px;display:grid;align-items:center}.stage{width:min(1080px,100%);margin:0 auto;display:grid;gap:20px}.kicker{width:max-content;padding:7px 16px;border-radius:999px;border:1px solid color-mix(in srgb,var(--accent) 38%,transparent);background:color-mix(in srgb,var(--accent) 14%,transparent);color:color-mix(in srgb,var(--accent) 84%,white);font-size:12px;font-weight:900;letter-spacing:.15em}.title{font-size:clamp(32px,3.5vw,50px);line-height:1.09;font-weight:900;margin:0}.hl{color:var(--accent)}.lead{max-width:820px;color:var(--muted);font-size:clamp(15px,1.28vw,19px);line-height:1.6}.triad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:8px}.card{padding:16px 18px;border:1px solid color-mix(in srgb,var(--accent) 32%,transparent);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border-radius:12px}.card b{display:block;color:color-mix(in srgb,var(--accent) 86%,white);font-size:20px}.card span{display:block;margin-top:7px;color:var(--muted);font-size:13px;line-height:1.45}.subtitle{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);width:min(1020px,calc(100vw - 180px));padding:12px 22px;border:1px solid var(--hair);border-radius:12px;background:rgba(0,0,0,.72);font-size:14px;text-align:center;color:rgba(255,255,255,.88)}
</style></head><body><section class="slide"><div class="stage"><div class="kicker">COMPACT GRID</div><h1 class="title">用<span class="hl">反馈闭环</span>解释复杂系统</h1><p class="lead">保持暗网格、轻光晕、细边框和紧凑中文排版；不要把整页包成巨大的玻璃卡片。</p><div class="triad"><div class="card"><b>定义</b><span>一句话建立概念边界</span></div><div class="card"><b>机制</b><span>展示变量如何相互作用</span></div><div class="card"><b>判断</b><span>输出可执行选择规则</span></div></div></div></section><div class="subtitle">适合默认 AI 概念课、技术学习页和章节讲解。</div></body></html>
