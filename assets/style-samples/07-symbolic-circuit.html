<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>symbolic-circuit sample</title><style>
:root{--bg:#05070b;--ink:#f8fbff;--muted:rgba(235,241,255,.62);--accent:#2dd4e8;--hair:rgba(255,255,255,.13)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:MiSans,Microsoft YaHei,sans-serif}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:60px 60px}.slide{height:100vh;padding:44px 58px 104px}.stage{width:min(1080px,100%);height:100%;margin:auto;display:grid;align-content:center;gap:18px}.kicker,.tag{color:var(--accent);font-size:12px;font-weight:900;letter-spacing:.14em}.title{font-size:38px;font-weight:900;line-height:1.12}.hl{color:var(--accent)}.circuit{display:grid;grid-template-columns:1fr 1fr;gap:18px;position:relative}.lane{border-top:1px solid var(--hair);padding:18px 0;display:grid;grid-template-columns:52px 1fr auto;gap:14px;align-items:center}.node-marker{width:34px;height:34px;border:1px solid color-mix(in srgb,var(--accent) 48%,transparent);border-radius:9px;display:grid;place-items:center;color:var(--accent);font-weight:900}.relation-label{font-size:11px;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);padding:4px 8px;border-radius:999px}.symbol{font-size:20px;color:var(--accent)}</style></head><body><section class="slide"><div class="stage"><div class="kicker">STYLE SAMPLE / SYMBOLIC CIRCUIT</div><div class="title">用<span class="hl">节点标记</span>和连接标签表达系统关系</div><div class="circuit"><div class="lane"><span class="node-marker">S</span><b>State</b><span class="relation-label">feeds</span></div><div class="lane"><span class="node-marker">T</span><b>Tool</b><span class="symbol">→</span></div><div class="lane"><span class="node-marker">E</span><b>Eval</b><span class="relation-label">checks</span></div><div class="lane"><span class="node-marker">R</span><b>Retry</b><span class="symbol">↻</span></div></div></div></section></body></html>
