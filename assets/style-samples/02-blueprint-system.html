<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>blueprint-system sample</title><style>
:root{--bg:#04101a;--ink:#eef8ff;--muted:rgba(218,238,255,.62);--hair:rgba(147,197,253,.22);--accent:#2dd4e8}*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;background:radial-gradient(circle at 70% 18%,rgba(45,212,232,.18),transparent 30%),#04101a;color:var(--ink);font-family:MiSans,'Microsoft YaHei',sans-serif}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(147,197,253,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(147,197,253,.055) 1px,transparent 1px);background-size:40px 40px}.slide{position:relative;z-index:1;height:100vh;padding:44px 60px 96px;display:grid;place-items:center}.stage{width:min(1120px,100%);display:grid;gap:20px}.kicker{font-size:12px;letter-spacing:.18em;color:var(--accent);font-weight:900}.title{margin:0;font-size:clamp(28px,3vw,42px);line-height:1.12}.hl{color:var(--accent)}.lead{color:var(--muted);font-size:17px;line-height:1.6}.system{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:18px;align-items:stretch}.lane{border:1px solid var(--hair);background:rgba(7,18,32,.52);padding:18px;border-radius:8px;position:relative}.lane:before{content:attr(data-label);position:absolute;top:-10px;left:14px;background:#04101a;color:var(--accent);font-size:11px;letter-spacing:.14em;padding:0 8px}.node{padding:12px 14px;border-left:3px solid var(--accent);background:rgba(255,255,255,.045);margin:10px 0}.node b{display:block;color:#e6fbff}.node span{display:block;color:var(--muted);font-size:13px;margin-top:4px}.connector{height:2px;background:linear-gradient(90deg,var(--accent),transparent);align-self:center;box-shadow:0 0 18px var(--accent)}
</style></head><body><section class="slide"><div class="stage"><div class="kicker">BLUEPRINT SYSTEM</div><h1 class="title">把 Agent 看成<span class="hl">状态流</span>与工具边界</h1><p class="lead">适合系统架构、流程编排、数据管道和多模块依赖关系。强调线、节点、分层和接口。</p><div class="system"><div class="lane" data-label="INPUT"><div class="node"><b>用户目标</b><span>约束、上下文、验收标准</span></div><div class="node"><b>证据源</b><span>文档、搜索、数据库</span></div></div><div class="lane" data-label="ORCHESTRATION"><div class="node"><b>Planner</b><span>拆解任务路径</span></div><div class="node"><b>Executor</b><span>选择工具并执行</span></div><div class="node"><b>Evaluator</b><span>判断是否回退或结束</span></div></div><div class="lane" data-label="OUTPUT"><div class="node"><b>结构化结果</b><span>可追溯、可审计、可复用</span></div></div></div></div></section></body></html>
