<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>minimal-evidence sample</title><style>
:root{--bg:#06080c;--ink:#f5f7fb;--muted:rgba(230,236,246,.58);--hair:rgba(255,255,255,.12);--accent:#93c5fd}*{box-sizing:border-box}body{margin:0;height:100vh;background:#06080c;color:var(--ink);font-family:MiSans,'Microsoft YaHei',sans-serif;overflow:hidden}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px);background-size:64px 64px}.slide{height:100vh;padding:46px 62px 96px;display:grid;align-items:center}.stage{width:min(980px,100%);margin:0 auto;display:grid;gap:18px}.kicker{font-size:11px;letter-spacing:.18em;color:var(--accent);font-weight:900}.title{margin:0;font-size:clamp(27px,2.65vw,38px);line-height:1.15}.hl{color:var(--accent)}.lead{color:var(--muted);font-size:16px;line-height:1.65;max-width:760px}.evidence{display:grid;gap:0;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair)}.item{display:grid;grid-template-columns:64px 1fr;gap:16px;align-items:start;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.09)}.item:last-child{border-bottom:0}.num{color:var(--accent);font-size:13px;font-weight:900;letter-spacing:.12em}.item b{font-size:17px}.item p{margin:5px 0 0;color:var(--muted);font-size:14px;line-height:1.55}.note{font-size:13px;color:rgba(255,255,255,.42)}
</style></head><body><section class="slide"><div class="stage"><div class="kicker">MINIMAL EVIDENCE</div><h1 class="title">证据型页面要把<span class="hl">判断链</span>排清楚</h1><p class="lead">适合正式报告、资料解读、研究结论和高信息密度学习笔记。弱化装饰，把注意力留给论证层次。</p><div class="evidence"><div class="item"><div class="num">01</div><div><b>事实层</b><p>哪些信息来自原文、数据或明确材料。</p></div></div><div class="item"><div class="num">02</div><div><b>推断层</b><p>基于事实做出的解释、归纳或模型化判断。</p></div></div><div class="item"><div class="num">03</div><div><b>应用层</b><p>这个判断如何转化为动作、检查项或下一步问题。</p></div></div></div><div class="note">Use this style when clarity matters more than spectacle.</div></div></section></body></html>
