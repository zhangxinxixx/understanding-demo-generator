<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>executive-radar sample</title><style>
:root{--bg:#07090f;--ink:#f7f9ff;--muted:rgba(235,241,255,.58);--hair:rgba(255,255,255,.12);--accent:#93c5fd;--warn:#f59e0b;--risk:#ff6f91}*{box-sizing:border-box}body{margin:0;height:100vh;background:#07090f;color:var(--ink);font-family:MiSans,'Microsoft YaHei',sans-serif;overflow:hidden}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:60px 60px}body:after{content:"";position:fixed;inset:-10%;background:radial-gradient(circle at 22% 20%,rgba(147,197,253,.10),transparent 25%),radial-gradient(circle at 78% 76%,rgba(245,158,11,.09),transparent 25%);filter:blur(80px)}.slide{position:relative;z-index:1;height:100vh;padding:44px 58px 92px;display:grid;align-items:center}.stage{width:min(1080px,100%);margin:0 auto;display:grid;gap:18px}.kicker{font-size:12px;color:var(--accent);letter-spacing:.16em;font-weight:900}.title{margin:0;font-size:clamp(28px,2.8vw,40px);line-height:1.14}.hl{color:var(--accent)}.lead{color:var(--muted);font-size:16px;line-height:1.6}.radar{display:grid;grid-template-columns:1.1fr .9fr;gap:24px}.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.metric{border-bottom:1px solid var(--hair);padding:14px 4px}.metric small{display:block;color:var(--muted);font-size:12px;letter-spacing:.08em}.metric b{display:block;font-size:25px;margin-top:8px}.risk{color:var(--risk)}.warn{color:var(--warn)}.memo{border-left:4px solid var(--accent);background:linear-gradient(90deg,rgba(147,197,253,.10),transparent);padding:18px 22px}.memo b{font-size:20px}.memo p{color:var(--muted);line-height:1.6;font-size:15px}.tag{display:inline-block;margin-top:14px;border:1px solid var(--hair);padding:7px 12px;border-radius:999px;color:var(--accent);font-size:12px;font-weight:800}
</style></head><body><section class="slide"><div class="stage"><div class="kicker">EXECUTIVE RADAR</div><h1 class="title">把复杂信息压缩成<span class="hl">判断面板</span></h1><p class="lead">适合宏观、市场、业务复盘和战略判断。少用炫光，多用指标、阈值、变化和结论。</p><div class="radar"><div class="metric-grid"><div class="metric"><small>PRIMARY DRIVER</small><b>实际利率</b></div><div class="metric"><small>RHYTHM</small><b>美元指数</b></div><div class="metric"><small>WATCH</small><b class="warn">ETF 流出</b></div><div class="metric"><small>RISK</small><b class="risk">流动性压力</b></div></div><div class="memo"><b>输出不是堆信息，而是判断条件</b><p>每页需要把事实、推断和触发条件分开，让读者知道什么会确认，什么会失效。</p><span class="tag">LOW SATURATION / HIGH SIGNAL</span></div></div></div></section></body></html>
