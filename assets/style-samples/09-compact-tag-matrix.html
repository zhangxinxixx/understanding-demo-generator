<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>tag matrix sample</title><style>
:root{--bg:#05070b;--ink:#f8fbff;--muted:rgba(235,241,255,.62);--accent:#fcd34d;--hair:rgba(255,255,255,.13)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:MiSans,Microsoft YaHei,sans-serif}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:60px 60px}.slide{height:100vh;padding:44px 58px 104px}.stage{width:min(1080px,100%);height:100%;margin:auto;display:grid;align-content:center;gap:18px}.title{font-size:38px;font-weight:900}.hl{color:var(--accent)}.matrix{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.cell{padding:15px 16px;border:1px solid var(--hair);background:rgba(255,255,255,.04);border-radius:12px}.tag{display:inline-block;font-size:10px;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 38%,transparent);border-radius:999px;padding:3px 8px;margin-bottom:10px}.symbol{color:var(--accent);font-size:20px;margin-right:8px}p{color:var(--muted);font-size:13px;line-height:1.45}</style></head><body><section class="slide"><div class="stage"><div class="title">多信息点用<span class="hl">紧凑标签矩阵</span>，不要长列表</div><div class="matrix"><div class="cell"><span class="tag">RISK</span><b><span class="symbol">!</span>目标漂移</b><p>目标没有被持续约束。</p></div><div class="cell"><span class="tag">STATE</span><b><span class="symbol">#</span>上下文污染</b><p>历史噪声进入决策。</p></div><div class="cell"><span class="tag">CHECK</span><b><span class="symbol">✓</span>评估漏判</b><p>错误没有被拦截。</p></div></div></div></section></body></html>
