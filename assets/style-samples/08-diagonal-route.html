<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>diagonal-route sample</title><style>
:root{--bg:#05070b;--ink:#f8fbff;--muted:rgba(235,241,255,.62);--accent:#6ee7b7;--hair:rgba(255,255,255,.13)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:MiSans,Microsoft YaHei,sans-serif}body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:60px 60px}.slide{height:100vh;padding:44px 58px 104px}.stage{width:min(1080px,100%);height:100%;margin:auto;display:grid;align-content:center;gap:18px}.title{font-size:38px;font-weight:900}.hl{color:var(--accent)}.route{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:center}.step{position:relative;padding:16px;border-left:3px solid var(--accent);background:linear-gradient(90deg,rgba(255,255,255,.055),transparent);min-height:120px}.step:nth-child(even){transform:translateY(38px)}.step:after{content:"→";position:absolute;right:-20px;top:45%;color:var(--accent)}.step:last-child:after{display:none}.tag{font-size:11px;color:var(--accent);letter-spacing:.12em}.num{font-size:26px;color:var(--accent);font-weight:900}</style></head><body><section class="slide"><div class="stage"><div class="title">避免平铺横排：用<span class="hl">斜向路线</span>制造节奏</div><div class="route"><div class="step"><div class="tag">STEP</div><div class="num">01</div><b>理解问题</b></div><div class="step"><div class="tag">CHECK</div><div class="num">02</div><b>拆解结构</b></div><div class="step"><div class="tag">BUILD</div><div class="num">03</div><b>生成闭环</b></div><div class="step"><div class="tag">VERIFY</div><div class="num">04</div><b>校验输出</b></div></div></div></section></body></html>
